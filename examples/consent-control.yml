norm_id: CN-PIPL-CONSENT-001
source:
  source_id: PIPL-2021
  document_title_zh: 中华人民共和国个人信息保护法
  document_title_en: Personal Information Protection Law of the People's Republic of China
  issuing_authority: 全国人民代表大会常务委员会
  article: 第二十九条
  source_text_zh: 处理敏感个人信息应当取得个人的单独同意；法律、行政法规规定处理敏感个人信息应当取得书面同意的，从其规定。
  working_translation_en: Processing sensitive personal information should obtain the individual's separate consent; where laws or administrative regulations require written consent, those requirements apply.
  source_url: https://www.npc.gov.cn/WZWSREL25wYy9jMi9jMzA4MzQvMjAyMTA4L3QyMDIxMDgyMF8zMTMwODguaHRtbD9yZWY9aW1i
  source_url_specificity: article_page
  promulgation_date: "2021-08-20"
  effective_date: "2021-11-01"
  retrieved_at: "2026-07-15"
  source_snapshot:
    retrieved_at: "2026-07-15"
    source_excerpt_sha256: ec341276fada70f962cd93c787960829db465411b60956df286fd67ef1ce80ca
    source_document_sha256: null
    verification_status: metadata_only
norm:
  regulated_actor: personal_information_processor
  modality: must
  action: obtain_separate_consent
  object: sensitive_personal_information
  trigger:
    processing_sensitive_personal_information: true
  exceptions:
    - lawful_exception_applies
  deadline_or_timing: before_processing
interpretation:
  control_objective: Synthetic actor face, voice, or biometric-like identifiers should not be processed unless separate consent evidence exists or a reviewed exception applies.
  automation_level: partially_automatable
  ambiguity_level: medium
  reviewer_note: The system can check consent evidence only after a reviewed determination that the data category is sensitive personal information.
evidence:
  evidence_type: consent_record
  required_fields:
    - separate_consent_present
test:
  expression: separate_consent_present == true
  pass_condition: Evidence confirms separate consent is present.
  fail_condition: Evidence confirms separate consent is absent and no exception applies.
  review_condition: Data category, exception, or consent scope requires legal review.
review:
  author_review_status: reviewed
  legal_expert_review_status: not_reviewed
  reviewer_role: researcher
  reviewer_name: null
  review_date: "2026-07-15"
  interpretation_version: "1.1"
  review_notes: Reviewed currently means internally reviewed by the researcher; no independent qualified legal expert review has been recorded.
