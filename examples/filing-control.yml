norm_id: CN-AIGC-FILING-001
source:
  document: Interim Measures for the Management of Generative AI Services
  article: Article 7
  effective_date: "2023-08-15"
  original_text: "Providers should manage model and service obligations, including filing or disclosure where applicable."
norm:
  regulated_actor: generative_ai_service_provider
  modality: must
  action: confirm_model_filing_applicability
  object: model_service
  trigger:
    service_with_filing_obligation: true
  exceptions:
    - filing_not_applicable_to_service
  deadline_or_timing: before_deployment
interpretation:
  control_objective: A model used for a covered AIGC service should have reviewed filing applicability and registered filing metadata where required.
  automation_level: partially_automatable
  ambiguity_level: medium
  reviewer_note: Whether filing is required may depend on service scope and regulator guidance; registration metadata can be checked once applicability is established.
evidence:
  evidence_type: model_filing_record
  required_fields:
    - model_id
    - filing_applicability_reviewed
    - filing_required
    - filing_status
    - registration_ref
test:
  expression: filing_required == false or filing_status == 'registered'
  pass_condition: Filing is not applicable or required filing metadata is registered.
  fail_condition: Filing is required and registration metadata is missing.
  review_condition: Filing applicability has not been reviewed.
review:
  legal_review_status: reviewed
  interpretation_version: "1.0"
