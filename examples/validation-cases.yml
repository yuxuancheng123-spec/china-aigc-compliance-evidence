    human_reviews:
      label_prominence: {completed: true, result: pass, reviewer_role: compliance_reviewer, reviewed_at: '2026-07-15'}
  expected: {CTRL-AIGC-VISIBLE-LABEL-PROMINENCE: pass}

- case_id: CASE-PASS-LABEL-ARTICLE-9-PROVIDER-DELIVERY
  description: Complete Article 9 evidence passes only in the declared provider-delivery scope.
  evidence:
    output_is_ai_generated: true
    output_is_user_facing: true
    output_matches_explicit_label_scenario: true
    visible_label_present: false
    visible_label_exception_requested: true
    user_labeling_obligation_disclosed: true
    user_use_responsibility_disclosed: true
    exception_log_retained: true
    log_retention_period_months: 6
    human_confirmations:
      output_matches_explicit_label_scenario: {confirmed: true, value: true, reviewer_role: compliance_reviewer, reviewed_at: '2026-07-15'}
  expected: {CTRL-AIGC-VISIBLE-LABEL-EXISTENCE: pass}

- case_id: CASE-FAIL-LABEL-ARTICLE-9-INCOMPLETE
