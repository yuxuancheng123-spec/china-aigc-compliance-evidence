- case_id: CASE-REVIEW-MISSING-HUMAN-CONFIRMATION
  description: A plain applicability Boolean is not a human confirmation record.
  evidence: {output_is_ai_generated: true, output_is_user_facing: true, output_matches_explicit_label_scenario: true, visible_label_present: true}
  expected: {CTRL-AIGC-VISIBLE-LABEL-EXISTENCE: review}

- case_id: CASE-REVIEW-CONFIRMATION-CONFLICT
  description: A reviewer confirmation that conflicts with business evidence routes the control to review.
  evidence:
    output_is_ai_generated: true
    output_is_user_facing: true
    output_matches_explicit_label_scenario: true
    visible_label_present: true
    human_confirmations:
      output_matches_explicit_label_scenario: {confirmed: true, value: false, reviewer_role: compliance_reviewer, reviewed_at: '2026-07-15'}
  expected: {CTRL-AIGC-VISIBLE-LABEL-EXISTENCE: review}

- case_id: CASE-PASS-LABEL-EXISTENCE-CONFIRMED
  description: A complete human confirmation enables the automated existence check.
  evidence:
    output_is_ai_generated: true
    output_is_user_facing: true
    output_matches_explicit_label_scenario: true
    visible_label_present: true
    human_confirmations:
      output_matches_explicit_label_scenario: {confirmed: true, value: true, reviewer_role: compliance_reviewer, reviewed_at: '2026-07-15'}
  expected: {CTRL-AIGC-VISIBLE-LABEL-EXISTENCE: pass}

- case_id: CASE-REVIEW-LABEL-PROMINENCE
  description: Label existence does not replace a required prominence review.
  evidence:
    output_is_ai_generated: true
    output_is_user_facing: true
    output_matches_explicit_label_scenario: true
    visible_label_present: true
    human_confirmations:
      output_matches_explicit_label_scenario: {confirmed: true, value: true, reviewer_role: compliance_reviewer, reviewed_at: '2026-07-15'}
  expected: {CTRL-AIGC-VISIBLE-LABEL-PROMINENCE: review}

- case_id: CASE-PASS-LABEL-PROMINENCE-AFTER-REVIEW
  description: A keyed prominence review may complete the final conclusion.
  evidence:
    output_is_ai_generated: true
    output_is_user_facing: true
    output_matches_explicit_label_scenario: true
    visible_label_present: true
    human_confirmations:
