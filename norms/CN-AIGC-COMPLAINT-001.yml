norm: {regulated_actor: generative_ai_service_provider, modality: must, action: maintain_complaint_mechanism, object: complaint_record, trigger: {complaint_received: true}, exceptions: [], deadline_or_timing: within_disclosed_feedback_time_limit}
interpretation: {control_objective: Verify process and feedback disclosure while routing timeliness to review, automation_level: human_review_required, ambiguity_level: medium, reviewer_note: Substantive adequacy and timeliness need keyed human review.}
