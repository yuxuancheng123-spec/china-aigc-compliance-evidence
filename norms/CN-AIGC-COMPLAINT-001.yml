norm_id: CN-AIGC-COMPLAINT-001
source: &genai_complaint_source
  source_id: GENAI-2023
  document_title_zh: 生成式人工智能服务管理暂行办法
  document_title_en: Interim Measures for the Management of Generative AI Services
  issuing_authority: 国家互联网信息办公室等七部门
  article: 第十五条
  source_text_zh: 提供者应当建立健全投诉、举报机制，设置便捷的投诉、举报入口，公布处理流程和反馈时限，及时受理、处理公众投诉举报并反馈处理结果。
  working_translation_en: Providers should establish complaint and reporting mechanisms, provide convenient entry points, disclose handling processes and feedback time limits, and handle and respond to public complaints promptly.
  source_url: https://www.cac.gov.cn/2023-07/13/c_1690898327029107.htm
  source_url_specificity: document_page
  promulgation_date: '2023-07-10'
  effective_date: '2023-08-15'
  retrieved_at: '2026-07-15'
