norm: {regulated_actor: generative_ai_service_provider, modality: must, action: complete_security_assessment_and_algorithm_filing, object: covered_public_facing_service, trigger: {service_is_public_facing: true, service_has_public_opinion_or_social_mobilization_capacity: true}, exceptions: [filing_not_required_after_review], deadline_or_timing: before_public_service_or_change}
interpretation: {control_objective: Check filing only after a human applicability determination, automation_level: human_review_required, ambiguity_level: medium, reviewer_note: Coverage and filing applicability are human-confirmed preconditions; final conclusion uses keyed human review.}
