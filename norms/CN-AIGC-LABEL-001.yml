norm: {regulated_actor: generative_ai_service_provider, modality: must, action: add_explicit_label_or_document_delivery_exception, object: user_facing_generated_synthetic_content, trigger: {output_is_ai_generated: true, output_is_user_facing: true, output_matches_explicit_label_scenario: true}, exceptions: [article_9_provider_delivery_exception], deadline_or_timing: before_delivery_or_publication}
interpretation: {control_objective: Check label existence with human-confirmed scenario classification and scope Article 9 to provider delivery, automation_level: partially_automatable, ambiguity_level: medium, reviewer_note: The evidence test is automated after human-confirmed scenario classification; the Article 9 path does not determine later publication or dissemination obligations.}
