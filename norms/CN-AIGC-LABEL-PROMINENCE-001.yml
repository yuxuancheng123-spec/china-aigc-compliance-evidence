norm_id: CN-AIGC-LABEL-PROMINENCE-001
source:
  source_id: LABEL-2025
  document_title_zh: 人工智能生成合成内容标识办法
  document_title_en: Measures for the Labeling of AI-Generated Synthetic Content
  issuing_authority: 国家互联网信息办公室 工业和信息化部 公安部 国家广播电视总局
  article: 第四条
  source_text_zh: 服务提供者提供的生成合成服务属于《互联网信息服务深度合成管理规定》第十七条第一款情形的，应当按照下列要求对生成合成内容添加显式标识。
  working_translation_en: Providers should add explicit labels to generated synthetic content when their services fall within the specified Deep Synthesis Article 17 scenarios.
