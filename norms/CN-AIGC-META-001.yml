norm_id: CN-AIGC-META-001
source:
  source_id: LABEL-2025
  document_title_zh: 人工智能生成合成内容标识办法
  document_title_en: Measures for the Labeling of AI-Generated Synthetic Content
  issuing_authority: 国家互联网信息办公室 工业和信息化部 公安部 国家广播电视总局
  article: 第五条
  source_text_zh: 服务提供者应当按照《互联网信息服务深度合成管理规定》第十六条的规定，在生成合成内容的文件元数据中添加隐式标识，隐式标识包含生成合成内容属性信息、服务提供者名称或者编码、内容编号等制作要素信息。
  working_translation_en: Providers should add implicit identifiers in generated-content file metadata, including generated-content attribute information, provider name or code, content ID, and other production elements.
  source_url: https://www.cac.gov.cn/2025-03/14/c_1743654684782215.htm
  source_url_specificity: document_page
  promulgation_date: '2025-03-07'
  effective_date: '2025-09-01'
  retrieved_at: '2026-07-15'
  source_snapshot: {retrieved_at: '2026-07-15', source_excerpt_sha256: metadata-only-label-article-5, source_document_sha256: null, verification_status: metadata_only}
norm: {regulated_actor: generative_ai_service_provider, modality: must, action: add_implicit_metadata_label, object: generated_synthetic_content, trigger: {output_is_ai_generated: true}, exceptions: [], deadline_or_timing: at_generation_or_publication}
interpretation: {control_objective: Verify selected required metadata fields, automation_level: fully_automatable, ambiguity_level: low, reviewer_note: This is a structured field-presence check, not a full technical-conformance test.}
evidence: {evidence_type: label_metadata, required_fields: [generated_content_attribute, service_provider_name_or_code, content_id]}
test: {expression: generated_content_attribute is not null and service_provider_name_or_code is not null and content_id is not null, pass_condition: Required fields are populated, fail_condition: A required field is absent, review_condition: Metadata cannot be parsed.}
review: {author_review_status: reviewed, legal_expert_review_status: not_reviewed, reviewer_role: researcher, reviewer_name: null, review_date: '2026-07-15', interpretation_version: '1.1', review_notes: Internally reviewed by the researcher; no independent qualified legal expert review is recorded.}
