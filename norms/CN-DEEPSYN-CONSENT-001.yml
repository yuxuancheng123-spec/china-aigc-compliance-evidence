norm_id: CN-DEEPSYN-CONSENT-001
source:
  source_id: DEEPSYN-2023
  document_title_zh: 互联网信息服务深度合成管理规定
  document_title_en: Provisions on the Administration of Deep Synthesis Internet Information Services
  issuing_authority: 国家互联网信息办公室 工业和信息化部 公安部
  article: 第十四条
  source_text_zh: 深度合成服务提供者和技术支持者提供人脸、人声等生物识别信息编辑功能的，应当提示深度合成服务使用者依法告知被编辑的个人，并取得其单独同意。
  working_translation_en: Providers and technical supporters offering face, voice, or other biometric-information editing functions should prompt users to notify the edited individual according to law and obtain separate consent.
  source_url: https://www.cac.gov.cn/2022-12/11/c_1672221949354811.htm
  source_url_specificity: document_page
  promulgation_date: '2022-11-25'
  effective_date: '2023-01-10'
  retrieved_at: '2026-07-15'
  source_snapshot: {retrieved_at: '2026-07-15', source_excerpt_sha256: metadata-only-deepsyn-article-14, source_document_sha256: null, verification_status: metadata_only}
norm: {regulated_actor: deep_synthesis_service_provider_or_technical_supporter, modality: must, action: prompt_user_about_notice_and_consent, object: face_or_voice_editing_feature, trigger: {deep_synthesis_face_or_voice_editing_feature: true}, exceptions: [], deadline_or_timing: before_editing}
interpretation: {control_objective: Record the direct prompt duty and separately label stronger retention evidence as organizational assurance, automation_level: partially_automatable, ambiguity_level: medium, reviewer_note: Provider evidence retention is an assurance design, not presented as verbatim statutory retention duty.}
