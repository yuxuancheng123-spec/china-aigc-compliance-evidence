norm_id: CN-PIPL-BIOMETRIC-001
source:
  source_id: PIPL-2021
  document_title_zh: 中华人民共和国个人信息保护法
  document_title_en: Personal Information Protection Law of the People's Republic of China
  issuing_authority: 全国人民代表大会常务委员会
  article: 第二十八条
  source_text_zh: 敏感个人信息是一旦泄露或者非法使用，容易导致自然人的人格尊严受到侵害或者人身、财产安全受到危害的个人信息，包括生物识别、宗教信仰、特定身份、医疗健康、金融账户、行踪轨迹等信息，以及不满十四周岁未成年人的个人信息。
  working_translation_en: Sensitive personal information includes information such as biometric identifiers that may harm dignity or personal or property security if disclosed or unlawfully used.
